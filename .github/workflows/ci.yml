name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install libgomp (LightGBM runtime)
        run: sudo apt-get update && sudo apt-get install -y libgomp1

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked

      - name: Byte-compile all sources
        run: uv run python -m compileall -q src scripts tests

      - name: Run unit tests
        run: uv run python -m unittest discover -s tests -v
